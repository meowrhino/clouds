name: sync proyectos.json desde neocities

on:
  schedule:
    # lunes a las 07:00 UTC = 08:00/09:00 CET
    - cron: "0 7 * * 1"
  workflow_dispatch: # botón de "run workflow" en la UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: install deps
        run: npm install

      - name: run sync
        run: node scripts/sync-from-neocities.mjs

      - name: commit si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [[ -n $(git status --porcelain proyectos.json) ]]; then
            git add proyectos.json
            git commit -m "chore: sync proyectos.json desde neocities"
            git push
          else
            echo "sin cambios"
          fi
